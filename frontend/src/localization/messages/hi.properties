about.eyebrow=TRA Journal के बारे में
about.title=ट्रेडर्स को कम friction और ज्यादा honesty के साथ review करने में मदद करने के लिए बनाया गया।
about.lead=TRA Journal हर तरह के user को trades capture करने, discipline review करने और session दर session बेहतर होने का आसान तरीका देता है।
about.heroCardTitle=यह product क्यों है
about.heroCardBody=अधिकांश traders result याद रखते हैं और process भूल जाते हैं। यह journal दोनों को save करने के लिए बनाया गया है, ताकि आपका review emotional नहीं बल्कि useful बने।
about.missionChip=मिशन
about.missionTitle=ट्रेडिंग नोट्स को दोहराने योग्य सुधार में बदलना
about.missionBody=हम simple daily journaling, fast pattern review और ऐसे practical insights पर ध्यान देते हैं जिन्हें आप अगले session से पहले सच में use कर सकें।
about.usersChip=किनके लिए
about.usersTitle=हर तरह के user के लिए उपयोगी
about.userNew=नए traders simple entries, default instruments और lesson prompts से शुरुआत कर सकते हैं।
about.userActive=Active traders execution quality, setups और repeated mistakes को एक ही जगह log कर सकते हैं।
about.userPremium=Premium users journaling को long-term review और renewal support के साथ जोड़ सकते हैं।
about.userAdmin=Admins app छोड़े बिना access, approvals और account health monitor कर सकते हैं।
about.valuesChip=यहां क्या मायने रखता है
about.valuesTitle=वर्कफ़्लो के पीछे के product values
about.valueClarityTitle=Clarity, clutter नहीं
about.valueClarityBody=महत्वपूर्ण actions visible, fast और understandable रहते हैं, चाहे trading day कितना भी messy रहा हो।
about.valueConsistencyTitle=Consistency, intensity नहीं
about.valueConsistencyBody=छोटी daily review habit अक्सर कभी-कभी होने वाले deep analysis से बेहतर होती है, इसलिए app repeat use के लिए design किया गया है।
about.valueGrowthTitle=Growth, guesswork नहीं
about.valueGrowthBody=मकसद सिर्फ trades store करना नहीं है। मकसद यह है कि आपको दिखे क्या repeat करना है, क्या रोकना है और आगे क्या test करना है।
about.contactTitle=संपर्क
about.contactBody=अगर आपको मदद, feedback support, या product के बारे में बात करनी हो, तो आप यहां संपर्क कर सकते हैं:
help.eyebrow=सपोर्ट
help.title=Guests, traders, premium members और admins के लिए मदद
help.lead=यह page basic workflow cover करता है ताकि app का कोई भी user जल्दी शुरू कर सके और समझ सके आगे कहाँ जाना है।
help.quickStartTitle=Quick start
help.quickStartBody=Sign in करें, trade record करें, अपना instrument और lesson add या drag करें, फिर patterns देखने के लिए dashboard खोलें।
help.gettingStartedChip=शुरुआत
help.gettingStartedTitle=जर्नल का उपयोग कैसे करें
help.stepOne=अपने journal workspace को खोलने और entries save करने के लिए sign in करें।
help.stepTwo=Trade form में instrument और lesson या setup add करें या drag करें।
help.stepThree=Date, PnL, comments और quality details भरें, फिर entry save करें।
help.stepFour=Trends, repeated mistakes और strongest instruments review करने के लिए dashboard खोलें।
help.userTypesChip=User type के अनुसार
help.userTypesTitle=हर user क्या कर सकता है
help.userGuest=Guests account बनाने या sign in करने से पहले About और Help pages देख सकते हैं।
help.userTrial=Trial users trades journal कर सकते हैं, expiry reminders monitor कर सकते हैं और जरूरत पड़ने पर renewal request भेज सकते हैं।
help.userPremium=Premium users full access बनाए रखते हैं और ज्यादा sessions में performance track कर सकते हैं।
help.userAdmin=Admins admin panel से payment approvals review, user activity monitor और access manage कर सकते हैं।
help.faqChip=सामान्य प्रश्न
help.faqTitle=आम सवाल
help.faqOneTitle=Drag and drop क्यों use करें?
help.faqOneBody=यह repeated instruments और lessons के लिए journaling को तेज़ बनाता है, और text boxes फिर भी आपको कभी भी custom items add करने देते हैं।
help.faqTwoTitle=अगर मेरा trial खत्म हो जाए तो?
help.faqTwoBody=App में renewal prompts दिखेंगे और access जारी रखने के लिए आप admin approval हेतु payment request submit कर सकते हैं।
help.faqThreeTitle=अगर मैं नया हूँ तो कहाँ से शुरू करूँ?
help.faqThreeBody=एक आदत से शुरू करें: हर trade को instrument, result और एक lesson के साथ log करें। शुरुआत में detail से ज्यादा consistency मायने रखती है।
login.note=साइन इन करके आप अपने ट्रेडिंग इतिहास से जुड़े अकाउंट के साथ जर्नल जारी रखने के लिए सहमत होते हैं।
