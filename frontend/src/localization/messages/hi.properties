journal.pageTitle=हर ट्रेड को स्पष्टता से जर्नल करें।
journal.tipLabel=आज की टिप
journal.tipOne=साफ सेटअप का इंतज़ार करें। बोरियत में लिए गए ट्रेड अक्सर मिस हुए ट्रेड से ज़्यादा नुकसान करते हैं।
journal.tipTwo=एंट्री क्यों ली, यह एक वाक्य में लिखें। साफ कारण भविष्य के रिव्यू को बेहतर बनाते हैं।
journal.tipThree=पहले पूंजी बचाइए। लगातार अनुशासन कभी-कभार के बड़े मुनाफे से अधिक मजबूत होता है।
journal.tipFour=अगर भावना ने आपकी योजना बदली, तो अगला ट्रेड लेने से पहले उसे नोट करें।
journal.tipFive=सिर्फ खराब ट्रेड नहीं, अपने सबसे अच्छे ट्रेड का भी रिव्यू करें। आपकी edge वहीं दिखती है।
