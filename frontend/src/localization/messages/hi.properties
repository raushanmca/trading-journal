ai.support.greeting=नमस्ते! मैं journaling, dashboard usage और basic app info में मदद कर सकता हूँ। आप पूछ सकते हैं जैसे "trade कैसे journal करूं?", "dashboard किस काम आता है?" या "about us".
ai.support.journal=Trade journal करने के लिए Journal page खोलें, trade date चुनें, instrument add या drag करें, PnL, rating और अपना lesson या setup भरें, फिर entry save करें। आप यहां trade बता भी सकते हैं और मैं उसे structured journal entry में बदल दूँगा।
ai.support.dashboard=Dashboard आपके trading patterns review करने में मदद करता है। इसमें performance trends, most traded instruments, repeated lessons या mistakes, और summary analysis दिखता है ताकि आपको समझ आए क्या काम कर रहा है और क्या सुधारना है।
ai.support.about=TRA Journal traders को ज्यादा clarity और कम friction के साथ trades review करने में मदद करने के लिए बनाया गया है। Support या product questions के लिए ranajeemca@gmail.com पर संपर्क करें।
ai.support.general=मैं journal flow, dashboard usage, About/Help information, और trade-to-journal conversion में मदद कर सकता हूँ। आप trade save करने का तरीका, dashboard क्या दिखाता है, या support contact के बारे में पूछ सकते हैं।

