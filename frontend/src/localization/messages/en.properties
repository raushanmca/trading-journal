about.eyebrow=About TRA Journal
about.title=Built to help traders review with more honesty and less friction.
about.lead=TRA Journal gives every type of user a cleaner way to capture trades, review discipline, and improve session by session.
about.heroCardTitle=Why this product exists
about.heroCardBody=Most traders remember the result and forget the process. This journal is designed to save both, so your review becomes useful instead of emotional.
about.missionChip=Mission
about.missionTitle=Turn trading notes into repeatable improvement
about.missionBody=We focus on simple daily journaling, fast pattern review, and practical insights you can actually use before the next session.
about.usersChip=Made for
about.usersTitle=Useful for every type of user
about.userNew=New traders can start with simple entries, default instruments, and lesson prompts.
about.userActive=Active traders can log execution quality, setups, and repeated mistakes in one place.
about.userPremium=Premium users can combine journaling with longer-term review and renewal support.
about.userAdmin=Admins can monitor access, approvals, and account health without leaving the app.
about.valuesChip=What matters here
about.valuesTitle=The product values behind the workflow
about.valueClarityTitle=Clarity over clutter
about.valueClarityBody=Important actions stay visible, fast, and understandable even when the trading day was messy.
about.valueConsistencyTitle=Consistency over intensity
about.valueConsistencyBody=A small daily review habit usually beats occasional deep analysis, so the app is designed for repeat use.
about.valueGrowthTitle=Growth over guesswork
about.valueGrowthBody=The goal is not just storing trades. It is helping you see what to repeat, what to stop, and what to test next.
about.contactTitle=Contact
about.contactBody=If you need help, feedback support, or want to discuss the product, you can reach us at:
help.eyebrow=Support
help.title=Help for guests, traders, premium members, and admins
help.lead=This page covers the latest journal workflow so anyone using the app can get started quickly, use mobile-friendly input, and know where to go next.
help.quickStartTitle=Quick start
help.quickStartBody=Sign in, record a trade, drag or add your instrument and lesson, or type directly on mobile, then review the dashboard for patterns.
help.gettingStartedChip=Getting started
help.gettingStartedTitle=How to use the journal
help.stepOne=Sign in to open your journal workspace and save your entries.
help.stepTwo=Add or drag an instrument and a lesson or setup into the trade form. On mobile, you can type directly in the drop areas.
help.stepThree=Enter date, PnL, comments, and quality details, then save the entry.
help.stepFour=Manage your sidebar lists by removing items you do not want or using Restore to bring back defaults.
help.userTypesChip=By user type
help.userTypesTitle=What each user can do
help.userGuest=Guests can explore the About and Help pages before creating an account or signing in.
help.userTrial=Trial users can journal trades, monitor expiry reminders, manage their instrument and lesson lists, and request renewal when needed.
help.userPremium=Premium users keep full access, can use the AI assistant for trade journaling, and continue tracking performance across more sessions.
help.userAdmin=Admins can review payment approvals, monitor user activity, and manage access from the admin panel.
help.faqChip=FAQ
help.faqTitle=Common questions
help.faqOneTitle=Why use drag and drop?
help.faqOneBody=It speeds up journaling for repeated instruments and lessons, while mobile users can also type directly in the drop areas when drag and drop is less convenient.
help.faqTwoTitle=What if my trial ends?
help.faqTwoBody=You will see renewal prompts in the app and can submit a payment request for admin approval to continue access.
help.faqThreeTitle=Where should I start if I am new?
help.faqThreeBody=Start with one habit: log every trade with the instrument, result, and one lesson. Consistency matters more than detail at first.
help.faqFourTitle=Can I change the default instruments and lessons?
help.faqFourBody=Yes. You can remove default items, keep only the ones you want, and use Restore in each sidebar header whenever you want the default list back.
