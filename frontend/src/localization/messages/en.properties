journal.tipTwo=Write one sentence about why you entered. Clear reasons improve future reviews.
journal.tipThree=Protect capital first. Consistency grows faster than occasional big wins.
journal.tipFour=If emotions changed your plan, note that before the next trade starts.
journal.tipFive=Review your best trade, not just your worst one. Edge leaves clues too.
