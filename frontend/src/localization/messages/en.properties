ai.support.journal=To journal a trade, open the Journal page, choose the trade date, add or drag an instrument, enter PnL, rating, and your lesson or setup, then save the entry. You can also describe the trade here and I can turn it into a structured journal entry.
ai.support.dashboard=The dashboard helps you review your trading patterns. It shows performance trends, your most traded instruments, repeated lessons or mistakes, and summary analysis so you can spot what is working and what needs attention.
ai.support.about=TRA Journal is built to help traders review trades with more clarity and less friction. For support or product questions, contact ranajeemca@gmail.com.
ai.support.general=I can help with journal flow, dashboard usage, About/Help information, and trade-to-journal conversion. Try asking about how to save a trade, what the dashboard shows, or where to contact support.

